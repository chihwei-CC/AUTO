<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto 工資系統 - v13.6</title>
  <style>
    :root { --primary: #2c3e50; --accent: #e74c3c; --side: #34495e; --orange: #f39c12; }
    body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f7f6; overflow: hidden; }
    
    /* 側邊欄 */
    .sidebar { width: 130px; background: var(--side); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
    .side-header { padding: 15px 10px; font-size: 14px; font-weight: bold; background: #2c3e50; text-align: center; border-bottom: 1px solid #1a252f; }
    .btn-wrap { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-wrap: wrap; gap: 5px; align-content: flex-start; }
    
    /* 按鈕樣式 */
    .btn { width: calc(50% - 3px); padding: 12px 0; background: #4b6584; border: none; color: #fff; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .btn:active { background: #1abc9c; transform: scale(0.9); }
    .btn-full { width: 100%; padding: 14px 0; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; margin-bottom: 8px; color: #fff; }
    .btn-ins { background: var(--orange); box-shadow: 0 3px 0 #d35400; }
    .btn-v { background: #f1c40f; color: #000; margin-top: 15px; box-shadow: 0 3px 0 #bc9c10; } 
    .btn-w { background: #3498db; margin-top: 5px; box-shadow: 0 3px 0 #2980b9; }
    .btn-z { background: var(--accent); box-shadow: 0 3px 0 #c0392b; }

    /* 主畫面 */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .search-bar { background: #fff; padding: 12px; border-bottom: 1px solid #ddd; display: flex; gap: 8px; align-items: center; }
    .search-bar input { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 6px; font-size: 15px; outline: none; }
    .sync-btn { padding: 5px 12px; background: #f8f9fa; border: 1px solid #ccc; border-radius: 4px; font-size: 11px; cursor: pointer; color: #666; }

    .content { flex: 1; overflow-y: auto; padding: 15px; }
    
    /* 報價卡片 (置中) */
    .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: #ddd; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; margin: 15px 0; }
    .price-card { background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 0; }
    .p-label { color: #7f8c8d; font-size: 13px; margin-bottom: 6px; }
    .p-val { color: var(--accent); font-size: 32px; font-weight: bold; cursor: pointer; text-align: center; }

    /* 表格設計 */
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    td { padding: 14px 10px; border-bottom: 1px solid #f0f0f0; font-size: 15px; color: #333; }
    .c-code { color: var(--accent); font-weight: bold; width: 90px; cursor: pointer; font-size: 16px; }
    
    /* 說明區塊 */
    .footer-guide { margin-top: 30px; padding: 20px; background: #ebf0f1; border-radius: 10px; border: 1px dashed #bdc3c7; }
    .guide-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .guide-col h4 { margin: 0 0 10px 0; color: var(--primary); border-bottom: 1px solid #ccc; padding-bottom: 5px; }
    .guide-col ul { padding-left: 18px; margin: 0; font-size: 13px; color: #555; line-height: 1.8; }

    #loader { padding: 8px; text-align: center; color: #fff; background: var(--orange); font-size: 12px; font-weight: bold; display: none; }
    #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 25px; border-radius: 30px; display: none; z-index: 999; }
    .hidden { display: none; }
    .sub-title { font-size: 14px; color: #2c3e50; margin: 20px 0 10px 5px; font-weight: bold; border-left: 5px solid var(--orange); padding-left: 10px; }

    @media (max-width: 600px) { .guide-box { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="side-header">Auto工資系統</div>
  <div class="btn-wrap">
    <button class="btn btn-full btn-ins" onclick="showIns()">💰 保險報價查詢</button>
    <button class="btn" onclick="goStd('A')">前保A</button>
    <button class="btn" onclick="goStd('B')">左前葉B</button>
    <button class="btn" onclick="goStd('C')">引擎蓋C</button>
    <button class="btn" onclick="goStd('D')">右前葉D</button>
    <button class="btn" onclick="goStd('E')">左戶定E</button>
    <button class="btn" onclick="goStd('F')">左前門F</button>
    <button class="btn" onclick="goStd('G')">左後門G</button>
    <button class="btn" onclick="goStd('H')">車頂蓋H</button>
    <button class="btn" onclick="goStd('I')">右前門I</button>
    <button class="btn" onclick="goStd('J')">右後門J</button>
    <button class="btn" onclick="goStd('K')">右戶定K</button>
    <button class="btn" onclick="goStd('L')">左後葉L</button>
    <button class="btn" onclick="goStd('M')">後箱蓋M</button>
    <button class="btn" onclick="goStd('N')">右後葉N</button>
    <button class="btn" onclick="goStd('O')">後保O</button>
    <button class="btn btn-z" onclick="goStd('Z')">通用Z</button>
    
    <button class="btn btn-full btn-v" onclick="goStd('V')">常用項目 V</button>
    <button class="btn btn-full btn-w" onclick="goStd('W')">特殊零件 W</button>
  </div>
</div>

<div class="main">
  <div id="loader">🔄 正在同步雲端資料，請稍候...</div>
  <div class="search-bar">
    <input type="text" id="kw" placeholder="輸入關鍵字或代碼搜尋..." oninput="goStd(this.value)">
    <button class="sync-btn" onclick="initSync()">資料<br>更新</button>
  </div>

  <div id="viewStd" class="content">
    <table id="resStd"><tr><td style="text-align:center; padding-top:50px; color:#999;">請點擊左側部位或輸入搜尋</td></tr></table>
    
    <div class="footer-guide">
      <div class="sub-title">📖 系統操作說明</div>
      <div class="guide-box">
        <div class="guide-col">
          <h4>【工資代碼查詢】</h4>
          <ul>
            <li><b>快速查找：</b>點擊左側 A-O 按鈕，系統會過濾該區域代碼。</li>
            <li><b>關鍵字：</b>輸入「前保」或代碼「A01」，自動排除重複。</li>
            <li><b>複製：</b>點擊<span style="color:var(--accent)">紅色代碼</span>即可直接複製。</li>
          </ul>
        </div>
        <div class="guide-col">
          <h4>【保險價格查詢】</h4>
          <ul>
            <li><b>切換：</b>點擊左上方橘色按鈕進入查詢模式。</li>
            <li><b>聯動：</b>選定車型與部位項目後，金額置中顯示並同步下方。</li>
            <li><b>更新：</b>若資料未同步，請按搜尋框旁的「資料更新」。</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <div id="viewIns" class="content hidden">
    <div style="background:#fff; padding:15px; border-radius:10px; border:1px solid #ddd;">
      <select id="selCar" onchange="getIns()" style="width:100%; padding:12px; font-size:16px;"><option value="">-- 選車型 --</option></select>
      <select id="selPart" onchange="getIns()" style="width:100%; padding:12px; font-size:16px; margin-top:10px; background:#fff9db;"><option value="">-- 選項目 --</option></select>
    </div>
    <div id="resPrice" class="hidden"></div>
    <div id="syncStdContainer" class="hidden">
      <div class="sub-title">對應工資代碼 (已過濾重複)</div>
      <table id="resStdUnderIns"></table>
    </div>
  </div>
</div>

<div id="toast">已複製到剪貼簿</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxKVn1d2DzAoC8g8XTI0gbwz4d8xS7Ol3cvguoakNnY9k80vbdq2LVbbXw0Z5sdstAw/exec"; 
  let localData = []; 

  window.onload = () => {
    initSync();
    fetch(`${API_URL}?action=getCarModels`).then(r => r.json()).then(l => l.forEach(m => document.getElementById('selCar').add(new Option(m,m))));
    fetch(`${API_URL}?action=getPartNames`).then(r => r.json()).then(l => l.forEach(p => document.getElementById('selPart').add(new Option(p,p))));
  };

  function initSync() {
    const loader = document.getElementById('loader');
    loader.style.display = 'block';
    fetch(`${API_URL}?action=getAllStdData`)
      .then(res => res.json())
      .then(data => {
        localData = data;
        loader.style.display = 'none';
        showToast("✓ 資料同步完成");
      }).catch(err => {
        loader.innerText = "⚠️ 同步失敗，請點擊資料更新";
      });
  }

  function goStd(val, targetTableId = 'resStd') {
    if(!val || localData.length === 0) return;
    if(targetTableId === 'resStd') {
      document.getElementById('viewStd').classList.remove('hidden');
      document.getElementById('viewIns').classList.add('hidden');
    }
    const k = val.trim().toUpperCase();
    let filtered = (k.length === 1 && /^[A-Z]$/.test(k)) 
      ? localData.filter(r => String(r[1]).toUpperCase() === k)
      : localData.filter(r => String(r[0]).toUpperCase().includes(k) || String(r[2]).toUpperCase().includes(k));
    
    const uniqueMap = new Map();
    filtered.forEach(item => { uniqueMap.set(item[0] + "|" + item[2], item); });
    const finalData = Array.from(uniqueMap.values());
    
    const table = document.getElementById(targetTableId);
    table.innerHTML = finalData.slice(0, 80).map(i => `<tr><td class="c-code" onclick="cp('${i[0]}')">${i[0]}</td><td>${i[2]}</td></tr>`).join('');
  }

  function showIns() {
    document.getElementById('viewStd').classList.add('hidden');
    document.getElementById('viewIns').classList.remove('hidden');
  }

  function getIns() {
    const car = document.getElementById('selCar').value, part = document.getElementById('selPart').value;
    const resPrice = document.getElementById('resPrice'), syncContainer = document.getElementById('syncStdContainer');
    if(!car || !part) return;

    document.getElementById('kw').value = part;
    syncContainer.classList.remove('hidden');
    goStd(part, 'resStdUnderIns');

    resPrice.classList.remove('hidden'); 
    resPrice.innerHTML = '<div style="padding:20px; text-align:center">🔍 讀取中...</div>';

    fetch(`${API_URL}?action=getInsurancePrice&car=${encodeURIComponent(car)}&part=${encodeURIComponent(part)}`)
      .then(r => r.json())
      .then(p => {
        if(!p) { resPrice.innerHTML = '<div style="padding:20px; text-align:center">此項無報價</div>'; return; }
        resPrice.innerHTML = `
          <div style="background:#2c3e50; color:#fff; padding:10px; text-align:center; border-radius:10px 10px 0 0; margin-top:15px; font-weight:bold;">${car} - ${part}</div>
          <div class="price-grid">
            <div class="price-card"><span class="p-label">一般塗裝</span><span class="p-val" onclick="cp('${p['一般']}')">${p['一般']}</span></div>
            <div class="price-card"><span class="p-label">水晶塗裝</span><span class="p-val" onclick="cp('${p['水晶']}')">${p['水晶']}</span></div>
            <div class="price-card"><span class="p-label">水性塗裝</span><span class="p-val" onclick="cp('${p['水性']}')">${p['水性']}</span></div>
            <div class="price-card"><span class="p-label">拆裝工資</span><span class="p-val" onclick="cp('${p['拆裝']}')">${p['拆裝']}</span></div>
          </div>`;
      });
  }

  function cp(t) {
    if(!t || t === "0") return;
    const el = document.createElement('textarea'); el.value = t; document.body.appendChild(el);
    el.select(); document.execCommand('copy'); document.body.removeChild(el);
    showToast("✓ 已複製到剪貼簿");
  }

  function showToast(msg) {
    const ts = document.getElementById('toast');
    ts.innerText = msg; ts.style.display = 'block';
    setTimeout(() => ts.style.display = 'none', 1500);
  }
</script>
</body>
</html>
